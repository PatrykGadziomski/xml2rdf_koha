  .node-author   { fill: #d64550; stroke: #333; stroke-width: 0.5; cursor: grab; }

  .node-literal  { fill: #ffd166; stroke: #333; stroke-width: 0.5; cursor: grab; }
  .node-resource { fill: #999999; stroke: #333; stroke-width: 0.5; cursor: grab; }
  .node-label    { font-size: 10px; fill: #222; text-anchor: middle; pointer-events: none; }
  .edge-line     { stroke: #cccccc; stroke-width: 1.3; }
</style>

<body>
<div id="info">

  <div id="legend">
    <span style="background:#06a77d"></span> Buch &nbsp;
    <span style="background:#d64550"></span> Autor &nbsp;
    <span style="background:#3d5a80"></span> Thema &nbsp;
    <span style="background:#ffd166"></span> Sonstiges
  </div>
</div>
<svg id="graph"></svg>

<script>

pper-jakob","group":"author"},{"label":"metzger-max","group":"author","id":"http://example.org/author/metzger-max"},{"group":"literal","label":"Edition Libri Rari im Verl. Sc...","id":"Edition Libri Rari im Verl. SchÃ¤fer__lit4"},{"label":"1986","group":"literal","id":"1986__lit5"},{"id":"9783887460440__lit9","group":"literal","label":"9783887460440"},{"group":"literal","label":"9783887461355","id":"9783887461355__lit0"},{"id":"3887463811__lit17","label":"3887463811","group":"literal"},{"group":"literal","label":"3887461355","id":"3887461355__lit1"}];
const allEdges = [{"from":"http://example.org/record/870544063","label":"identifier","to":"9783887461355__lit0"},{"label":"identifier","from":"http://example.org/record/870544063","to":"3887461355__lit1"},{"to":"http://example.org/author/metzger-max","label":"creator","from":"http://example.org/record/870544063"},{"label":"title","from":"http://example.org/record/870544063","to":"<<Die>> Kunstschlosserei__lit2"},{"to":"Coleman__lit3","from":"http://example.org/record/870544063","label":"publisher"},{"from":"http://example.org/record/870544063","label":"publisher","to":"Edition Libri Rari im Verl. SchÃ¤fer__lit4"},{"to":"1986__lit5","label":"date","from":"http://example.org/record/870544063"},{"from":"http://example.org/record/870544063","label":"subject","to":"http://example.org/subject/kunstschlosserei"},{"label":"subject","from":"http://example.org/record/870544063","to":"http://example.org/subject/schmiedekunst"},{"from":"http://example.org/author/metzger-max","label":"name","to":"Metzger, Max__lit6"},{"from":"http://example.org/subject/kunstschlosserei","label":"prefLabel","to":"Kunstschlosserei__lit7"},{"label":"prefLabel","from":"http://example.org/subject/schmiedekunst","to":"Schmiedekunst__lit8"},{"from":"http://example.org/record/830891196","label":"identifier","to":"9783887460440__lit9"},{"to":"3887460448__lit10","label":"identifier","from":"http://example.org/record/830891196"},{"to":"http://example.org/author/zipper-jakob","label":"creator","from":"http://example.org/record/830891196"},{"from":"http://example.org/record/830891196","label":"title","to":"Theoretisch-praktische Anweisung zu Schlosserarbeiten nebst den dazu gehÃ¶rigen Zeichnungen und Rissen__lit11"},{"from":"http://example.org/record/830891196","label":"publisher","to":"Edition \"Libri Rari\" SchÃ¤fer__lit12"},{"label":"date","from":"http://example.org/record/830891196","to":"1983__lit13"},{"to":"http://example.org/subject/schmiedekunst","from":"http://example.org/record/830891196","label":"subject"},{"to":"http://example.org/subject/schlosserarbeit","from":"http://example.org/record/830891196","label":"subject"},{"from":"http://example.org/author/zipper-jakob","label":"name","to":"Zipper, Jakob__lit14"},{"to":"Schlosserarbeit__lit15","from":"http://example.org/subject/schlosserarbeit","label":"prefLabel"},{"to":"9783887463816__lit16","from":"http://example.org/record/953728498","label":"identifier"},{"to":"3887463811__lit17","label":"identifier","from":"http://example.org/record/953728498"},{"from":"http://example.org/record/953728498","label":"creator","to":"http://example.org/author/metzger-max"},{"from":"http://example.org/record/953728498","label":"title","to":"Stilkunde fÃ¼r Kunstschlosser__lit18"},{"to":"Ed. Libri Rari, SchÃ¤fer__lit19","from":"http://example.org/record/953728498","label":"publisher"},{"to":"1998__lit20","from":"http://example.org/record/953728498","label":"date"},{"to":"http://example.org/subject/kunstschlosserei","label":"subject","from":"http://example.org/record/953728498"},{"to":"http://example.org/subject/schmiedekunst","from":"http://example.org/record/953728498","label":"subject"},{"to":"http://example.org/subject/kunststil","label":"subject","from":"http://example.org/record/953728498"},{"from":"http://example.org/subject/kunststil","label":"prefLabel","to":"Kunststil__lit21"}];

const nodeMap = {};
allNodes.forEach(n => nodeMap[n.id] = n);

// --- Physik-Zustand: jeder Knoten bekommt Position + Geschwindigkeit ---
const W = 1400, H = 900;
allNodes.forEach(n => {
    n.x = W/2 + (Math.random() - 0.5) * 400;
    n.y = H/2 + (Math.random() - 0.5) * 400;
    n.vx = 0;
    n.vy = 0;
});

// --- Physik-Parameter ---
const REPULSION       = 12000;
const SPRING_LENGTH   = 140;
const SPRING_STRENGTH = 0.02;
const DAMPING         = 0.85;
const CENTER_PULL     = 0.002;

function simulationStep() {
    for (let i = 0; i < allNodes.length; i++) {
        for (let j = i + 1; j < allNodes.length; j++) {
            const a = allNodes[i], b = allNodes[j];
            let dx = a.x - b.x, dy = a.y - b.y;
            let distSq = dx*dx + dy*dy || 0.01;
            let dist = Math.sqrt(distSq);
            let force = REPULSION / distSq;
            let fx = (dx / dist) * force;
            let fy = (dy / dist) * force;
            a.vx += fx; a.vy += fy;
            b.vx -= fx; b.vy -= fy;
        }
    }

    allEdges.forEach(e => {
        const a = nodeMap[e.from], b = nodeMap[e.to];
        if (!a || !b) return;
        let dx = b.x - a.x, dy = b.y - a.y;
        let dist = Math.sqrt(dx*dx + dy*dy) || 0.01;
        let displacement = dist - SPRING_LENGTH;
        let force = displacement * SPRING_STRENGTH;
        let fx = (dx / dist) * force;
        let fy = (dy / dist) * force;
        a.vx += fx; a.vy += fy;
        b.vx -= fx; b.vy -= fy;
    });

    allNodes.forEach(n => {
        if (n.dragging) return;
        n.vx += (W/2 - n.x) * CENTER_PULL;
        n.vy += (H/2 - n.y) * CENTER_PULL;
        n.vx *= DAMPING;
        n.vy *= DAMPING;
        n.x += n.vx;
        n.y += n.vy;
    });
}

// --- SVG-Elemente einmalig anlegen ---
const SVG_NS = 'http://www.w3.org/2000/svg';
const svg = document.getElementById('graph');
svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

function svgEl(tag, attrs) {
    const el = document.createElementNS(SVG_NS, tag);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
}

const groupClass = {
    book:     'node-book',
    author:   'node-author',
    subject:  'node-subject',
    literal:  'node-literal',
    resource: 'node-resource'
};

const edgeLines = allEdges.map(() => {
    const line = svgEl('line', { class: 'edge-line' });
    svg.appendChild(line);
    return line;
});

const nodeShapes = allNodes.map(n => {
    let shape;
    const cls = groupClass[n.group] || 'node-resource';
    if (n.group === 'literal') {
        shape = svgEl('rect', { class: cls, width: 100, height: 24, rx: 4 });
    } else {
        shape = svgEl('circle', { class: cls, r: 16 });
    }
    shape.addEventListener('mousedown', evt => startDrag(evt, n));
    svg.appendChild(shape);

    const label = svgEl('text', { class: 'node-label' });
    label.textContent = n.label;
    svg.appendChild(label);

    return { shape, label };
});

function draw() {
    allEdges.forEach((e, i) => {
        const a = nodeMap[e.from], b = nodeMap[e.to];
        if (!a || !b) return;
        const line = edgeLines[i];
        line.setAttribute('x1', a.x);
        line.setAttribute('y1', a.y);
        line.setAttribute('x2', b.x);
        line.setAttribute('y2', b.y);
    });

    allNodes.forEach((n, i) => {
        const { shape, label } = nodeShapes[i];
        if (n.group === 'literal') {
            shape.setAttribute('x', n.x - 50);
            shape.setAttribute('y', n.y - 12);
        } else {
            shape.setAttribute('cx', n.x);
            shape.setAttribute('cy', n.y);
        }
        label.setAttribute('x', n.x);
        label.setAttribute('y', n.y + 30);
    });
}

function animate() {
    simulationStep();
    draw();
    requestAnimationFrame(animate);
}

// --- Dragging ---
let dragOffset = { x: 0, y: 0 };
let dragNode = null;

function startDrag(evt, n) {
    dragNode = n;
    n.dragging = true;
    const pt = toSvgCoords(evt);
    dragOffset.x = pt.x - n.x;
    dragOffset.y = pt.y - n.y;
    evt.stopPropagation();
}

function toSvgCoords(evt) {
    const rect = svg.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    return {
        x: (evt.clientX - rect.left) * scaleX,
        y: (evt.clientY - rect.top) * scaleY
    };
}

document.addEventListener('mousemove', evt => {
    if (!dragNode) return;
    const pt = toSvgCoords(evt);
    dragNode.x = pt.x - dragOffset.x;
    dragNode.y = pt.y - dragOffset.y;
    dragNode.vx = 0;
    dragNode.vy = 0;
});

document.addEventListener('mouseup', () => {
    if (dragNode) dragNode.dragging = false;
    dragNode = null;
});

document.getElementById('stats').textContent =
    'Knoten: ' + allNodes.length + ' | Kanten: ' + allEdges.length;

animate();
</script>
</body>
</html>
